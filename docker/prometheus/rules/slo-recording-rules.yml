# SLO recording rules — precompute the SLI ratios used by the burn-rate alerts.
# Recording ratios once (rather than re-deriving them in every alert) keeps alert
# evaluation cheap and guarantees the alert and the dashboard use the SAME number.
# Metric names verified live 2026-07-01 (see docs/slo/sli-slo-catalog.md).
groups:
  - name: slo_http_error_ratios
    interval: 30s
    rules:
      # Availability error ratio (5xx / all served), business routes only, per service.
      # Windows chosen for multi-window burn-rate alerting (fast pair 5m+1h, slow pair 30m+6h).
      # NOTE: the numerator is guarded with `or (<total> * 0)` so that when a service
      # has traffic but ZERO 5xx, the ratio records an explicit 0 (not an empty vector,
      # which would render as "No Data" — ambiguous between "healthy" and "broken").
      # When there is no traffic at all, the series is legitimately absent.
      - record: job:http_error_ratio:rate5m
        expr: |
          (
            sum by (job) (rate(http_server_requests_seconds_count{status=~"5..",uri!~"/actuator.*"}[5m]))
            or
            sum by (job) (rate(http_server_requests_seconds_count{uri!~"/actuator.*"}[5m])) * 0
          )
          /
          sum by (job) (rate(http_server_requests_seconds_count{uri!~"/actuator.*"}[5m]))
      - record: job:http_error_ratio:rate30m
        expr: |
          (
            sum by (job) (rate(http_server_requests_seconds_count{status=~"5..",uri!~"/actuator.*"}[30m]))
            or
            sum by (job) (rate(http_server_requests_seconds_count{uri!~"/actuator.*"}[30m])) * 0
          )
          /
          sum by (job) (rate(http_server_requests_seconds_count{uri!~"/actuator.*"}[30m]))
      - record: job:http_error_ratio:rate1h
        expr: |
          (
            sum by (job) (rate(http_server_requests_seconds_count{status=~"5..",uri!~"/actuator.*"}[1h]))
            or
            sum by (job) (rate(http_server_requests_seconds_count{uri!~"/actuator.*"}[1h])) * 0
          )
          /
          sum by (job) (rate(http_server_requests_seconds_count{uri!~"/actuator.*"}[1h]))
      - record: job:http_error_ratio:rate6h
        expr: |
          (
            sum by (job) (rate(http_server_requests_seconds_count{status=~"5..",uri!~"/actuator.*"}[6h]))
            or
            sum by (job) (rate(http_server_requests_seconds_count{uri!~"/actuator.*"}[6h])) * 0
          )
          /
          sum by (job) (rate(http_server_requests_seconds_count{uri!~"/actuator.*"}[6h]))

  - name: slo_latency_ratios
    interval: 30s
    rules:
      # Fraction of business requests SLOWER than 300ms (the latency "bad" ratio), per service.
      # Requires histogram buckets (enabled + verified 2026-07-01).
      - record: job:http_latency_over_threshold_ratio:rate5m
        expr: |
          1 - (
            sum by (job) (rate(http_server_requests_seconds_bucket{le="0.3",uri!~"/actuator.*"}[5m]))
            /
            sum by (job) (rate(http_server_requests_seconds_count{uri!~"/actuator.*"}[5m]))
          )