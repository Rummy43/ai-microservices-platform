server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: user-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: user-service
          service: user-service
          app: user-service
          __path__: /var/log/user-service/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger_name
            thread: thread_name
            message: message
            traceId: traceId
            service_name: service

      - labels:
          level:
          service_name:

  - job_name: notification-service
    static_configs:
      - targets:
          - localhost
        labels:
          job: notification-service
          service: notification-service
          app: notification-service
          __path__: /var/log/notification-service/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger_name
            thread: thread_name
            message: message
            traceId: traceId
            service_name: service

      - labels:
          level:
          service_name: