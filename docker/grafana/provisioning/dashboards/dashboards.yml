apiVersion: 1

providers:
  - name: 'platform-dashboards'
    orgId: 1
    folder: 'AI Microservices Platform'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false