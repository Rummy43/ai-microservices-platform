# Alertmanager routing.
# Local/portfolio setup: no external pager wired (no PagerDuty/Slack secrets in the
# repo). Routes are structured as they would be in production; the receivers are null
# sinks so the pipeline is exercisable end-to-end without leaking credentials.
# Swap a receiver's config for a real webhook_configs/slack_configs when integrating.
route:
  receiver: default
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = "page"
      receiver: pager
      group_wait: 10s
    - matchers:
        - severity = "ticket"
      receiver: tickets

inhibit_rules:
  # A firing page for a job suppresses the lower-severity ticket for the same job.
  - source_matchers: [severity = "page"]
    target_matchers: [severity = "ticket"]
    equal: ['job']

receivers:
  - name: default
  - name: pager
  - name: tickets