<svg width="1500" height="900" viewBox="0 0 1500 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0" stop-color="#0E1A2B"/><stop offset="1" stop-color="#152134"/></linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1B3A6B"/><stop offset="0.5" stop-color="#0D5F5F"/><stop offset="1" stop-color="#1B3A6B"/></linearGradient>
    <linearGradient id="gwG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2A1E4A"/><stop offset="1" stop-color="#1C1330"/></linearGradient>
    <linearGradient id="usG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1E3A5F"/><stop offset="1" stop-color="#152A4A"/></linearGradient>
    <linearGradient id="kfG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3D1F00"/><stop offset="1" stop-color="#2A1500"/></linearGradient>
    <linearGradient id="nfG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1A3A2A"/><stop offset="1" stop-color="#112A1E"/></linearGradient>
    <linearGradient id="dlG" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3A1622"/><stop offset="1" stop-color="#280F18"/></linearGradient>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="120%"><feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#000" flood-opacity="0.4"/></filter>
    <marker id="aB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#4A9EFF"/></marker>
    <marker id="aO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#FF8C42"/></marker>
    <marker id="aG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#4ADE80"/></marker>
    <marker id="aC" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#22D3EE"/></marker>
    <marker id="aY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#F59E0B"/></marker>
    <marker id="aR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#FB7185"/></marker>
    <marker id="aS" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#38BDF8"/></marker>
    <marker id="aE" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#34D399"/></marker>
  </defs>

  <rect width="1500" height="900" fill="url(#bg)"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#1E2D45" stroke-width="0.5"/></pattern>
  <rect width="1500" height="900" fill="url(#grid)" opacity="0.35"/>

  <!-- HEADER -->
  <rect x="40" y="20" width="1420" height="72" rx="12" fill="url(#hdr)" filter="url(#sh)"/>
  <rect x="40" y="20" width="1420" height="3" rx="2" fill="#4A9EFF" opacity="0.8"/>
  <text x="750" y="52" text-anchor="middle" font-size="24" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">Identity Propagation Across Async Boundaries</text>
  <text x="750" y="76" text-anchor="middle" font-size="12.5" fill="#A9C0DA">The acting user, carried from JWT to dead-letter queue — as data, not ambient thread state</text>

  <!-- IDENTITY CARRIER RIBBON -->
  <rect x="40" y="108" width="1420" height="86" rx="12" fill="#0C231C" stroke="#34D399" stroke-width="1.4"/>
  <text x="58" y="130" font-size="12" font-weight="700" fill="#6EE7B7" letter-spacing="0.5">WHO IS ACTING — the same identity, re-encoded at each hop</text>
  <!-- chips -->
  <g font-size="10.5">
    <rect x="58" y="150" width="180" height="30" rx="6" fill="#08201A" stroke="#34D399" stroke-width="0.9"/><text x="148" y="169" text-anchor="middle" fill="#A7F3D0">SecurityContext · JWT</text>
    <line x1="240" y1="165" x2="262" y2="165" stroke="#34D399" stroke-width="1.4" marker-end="url(#aE)"/>
    <rect x="264" y="150" width="188" height="30" rx="6" fill="#08201A" stroke="#34D399" stroke-width="0.9"/><text x="358" y="169" text-anchor="middle" fill="#A7F3D0">X-User-* · HTTP headers</text>
    <line x1="454" y1="165" x2="476" y2="165" stroke="#34D399" stroke-width="1.4" marker-end="url(#aE)"/>
    <rect x="478" y="150" width="232" height="30" rx="6" fill="#1A1200" stroke="#F59E0B" stroke-width="1"/><text x="594" y="169" text-anchor="middle" fill="#FDE68A">actor_* · outbox row (same TX)</text>
    <line x1="712" y1="165" x2="734" y2="165" stroke="#34D399" stroke-width="1.4" marker-end="url(#aE)"/>
    <rect x="736" y="150" width="196" height="30" rx="6" fill="#08201A" stroke="#34D399" stroke-width="0.9"/><text x="834" y="169" text-anchor="middle" fill="#A7F3D0">X-User-* · Kafka headers</text>
    <line x1="934" y1="165" x2="956" y2="165" stroke="#34D399" stroke-width="1.4" marker-end="url(#aE)"/>
    <rect x="958" y="150" width="190" height="30" rx="6" fill="#08201A" stroke="#34D399" stroke-width="0.9"/><text x="1053" y="169" text-anchor="middle" fill="#A7F3D0">MDC · consumer thread</text>
    <line x1="1150" y1="165" x2="1172" y2="165" stroke="#34D399" stroke-width="1.4" marker-end="url(#aE)"/>
    <rect x="1174" y="150" width="272" height="30" rx="6" fill="#2A0F16" stroke="#FB7185" stroke-width="1"/><text x="1310" y="169" text-anchor="middle" fill="#FDA4AF">actor_* · dead_letter_events</text>
  </g>

  <!-- THREAD-CONTEXT BANNERS -->
  <text x="300" y="232" text-anchor="middle" font-size="12" font-weight="700" fill="#5A7597" letter-spacing="1">① REQUEST THREAD</text>
  <text x="748" y="232" text-anchor="middle" font-size="12" font-weight="700" fill="#5A7597" letter-spacing="1">② SCHEDULED THREAD</text>
  <text x="1200" y="232" text-anchor="middle" font-size="12" font-weight="700" fill="#5A7597" letter-spacing="1">③ CONSUMER THREAD</text>
  <line x1="586" y1="244" x2="586" y2="620" stroke="#26374F" stroke-width="1.2" stroke-dasharray="5,5"/>
  <line x1="922" y1="244" x2="922" y2="620" stroke="#26374F" stroke-width="1.2" stroke-dasharray="5,5"/>

  <!-- CLIENT -->
  <rect x="48" y="322" width="110" height="80" rx="10" fill="#1E2D3D" stroke="#4A9EFF" stroke-width="1.4" filter="url(#sh)"/>
  <text x="103" y="356" text-anchor="middle" font-size="12.5" font-weight="600" fill="#E2E8F0">Client</text>
  <text x="103" y="375" text-anchor="middle" font-size="10" fill="#64748B">+ Keycloak JWT</text>
  <line x1="158" y1="362" x2="176" y2="362" stroke="#4A9EFF" stroke-width="2" marker-end="url(#aB)"/>

  <!-- GATEWAY -->
  <rect x="178" y="300" width="180" height="124" rx="12" fill="url(#gwG)" stroke="#A78BFA" stroke-width="1.8" filter="url(#sh)"/>
  <text x="268" y="326" text-anchor="middle" font-size="13.5" font-weight="700" fill="#C4B5FD">🔐 API Gateway</text>
  <text x="268" y="347" text-anchor="middle" font-size="10" fill="#94A3B8">validates JWT (once)</text>
  <rect x="192" y="356" width="152" height="52" rx="6" fill="#160E28" stroke="#8B5CF6" stroke-width="0.8"/>
  <text x="268" y="374" text-anchor="middle" font-size="10" font-weight="600" fill="#DDD6FE">overwrites X-User-*</text>
  <text x="268" y="389" text-anchor="middle" font-size="9.5" fill="#8B93A8">(anti-spoof: forged</text>
  <text x="268" y="401" text-anchor="middle" font-size="9.5" fill="#8B93A8">headers can't get in)</text>
  <line x1="358" y1="362" x2="378" y2="362" stroke="#4A9EFF" stroke-width="2.2" marker-end="url(#aB)"/>
  <text x="368" y="352" text-anchor="middle" font-size="9" fill="#7DB2FF">HTTP</text>

  <!-- USER SERVICE -->
  <rect x="380" y="300" width="192" height="124" rx="12" fill="url(#usG)" stroke="#4A9EFF" stroke-width="1.8" filter="url(#sh)"/>
  <text x="476" y="326" text-anchor="middle" font-size="13.5" font-weight="700" fill="#93C5FD">☁️ user-service</text>
  <rect x="394" y="336" width="164" height="72" rx="6" fill="#0A1A35" stroke="#F59E0B" stroke-width="1.3"/>
  <rect x="394" y="336" width="6" height="72" rx="3" fill="#F59E0B"/>
  <text x="479" y="354" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FDE68A">ONE transaction</text>
  <text x="479" y="371" text-anchor="middle" font-size="9.8" fill="#94A3B8">save user  +  outbox row</text>
  <text x="479" y="386" text-anchor="middle" font-size="9.8" fill="#94A3B8">actor_username / email / roles</text>
  <text x="479" y="400" text-anchor="middle" font-size="9.8" fill="#94A3B8">+ trace_id  → persisted</text>

  <!-- OUTBOX STORE -->
  <line x1="476" y1="424" x2="476" y2="452" stroke="#F59E0B" stroke-width="1.8" marker-end="url(#aY)"/>
  <text x="530" y="443" text-anchor="middle" font-size="9.5" fill="#FBBF24">commit</text>
  <rect x="380" y="454" width="192" height="78" rx="10" fill="#1A0D00" stroke="#F59E0B" stroke-width="1.4" filter="url(#sh)"/>
  <text x="476" y="480" text-anchor="middle" font-size="12.5" font-weight="600" fill="#FDE68A">🗄️ outbox_events (MySQL)</text>
  <text x="476" y="499" text-anchor="middle" font-size="9.8" fill="#94A3B8">status: PENDING · payload (Avro)</text>
  <text x="476" y="514" text-anchor="middle" font-size="9.8" fill="#6EE7B7">actor_* + trace_id columns</text>

  <!-- PUBLISHER reads from row -->
  <path d="M572 500 C 620 500, 600 420, 600 402" fill="none" stroke="#22D3EE" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#aC)"/>
  <text x="648" y="470" text-anchor="middle" font-size="9.5" fill="#67E8F9">poll + read actor</text>

  <!-- OUTBOX PUBLISHER -->
  <rect x="600" y="300" width="156" height="124" rx="12" fill="#0A1B22" stroke="#22D3EE" stroke-width="1.8" filter="url(#sh)"/>
  <text x="678" y="326" text-anchor="middle" font-size="12.5" font-weight="700" fill="#67E8F9">⏱️ Outbox Publisher</text>
  <text x="678" y="346" text-anchor="middle" font-size="9.8" fill="#94A3B8">@Scheduled · not the</text>
  <text x="678" y="359" text-anchor="middle" font-size="9.8" fill="#94A3B8">request thread</text>
  <rect x="614" y="368" width="128" height="42" rx="6" fill="#05161C"/>
  <text x="678" y="385" text-anchor="middle" font-size="9.5" fill="#A5F3FC">actor supplied explicitly</text>
  <text x="678" y="399" text-anchor="middle" font-size="9.5" fill="#8B93A8">(MDC is empty here)</text>
  <line x1="756" y1="362" x2="768" y2="362" stroke="#FF8C42" stroke-width="2.2" marker-end="url(#aO)"/>

  <!-- KAFKA -->
  <rect x="770" y="300" width="134" height="124" rx="12" fill="url(#kfG)" stroke="#FF8C42" stroke-width="1.8" filter="url(#sh)"/>
  <text x="837" y="326" text-anchor="middle" font-size="13" font-weight="700" fill="#FED7AA">⚡ Kafka</text>
  <text x="837" y="345" text-anchor="middle" font-size="9.8" fill="#FB923C">user-created-topic</text>
  <rect x="784" y="356" width="106" height="52" rx="6" fill="#2A1000" stroke="#FB923C" stroke-width="0.8"/>
  <text x="837" y="374" text-anchor="middle" font-size="9.5" font-weight="600" fill="#FDE68A">headers:</text>
  <text x="837" y="388" text-anchor="middle" font-size="9.2" fill="#94A3B8">X-User-* ,</text>
  <text x="837" y="400" text-anchor="middle" font-size="9.2" fill="#94A3B8">trace-id</text>
  <line x1="904" y1="362" x2="936" y2="362" stroke="#4ADE80" stroke-width="2.2" marker-end="url(#aG)"/>
  <text x="920" y="352" text-anchor="middle" font-size="9" fill="#4ADE80">consume</text>

  <!-- CONSUMER -->
  <rect x="938" y="300" width="204" height="124" rx="12" fill="url(#nfG)" stroke="#4ADE80" stroke-width="1.8" filter="url(#sh)"/>
  <text x="1040" y="326" text-anchor="middle" font-size="13" font-weight="700" fill="#86EFAC">🔔 notification-service</text>
  <text x="1040" y="345" text-anchor="middle" font-size="9.8" fill="#94A3B8">@KafkaListener · @RetryableTopic</text>
  <rect x="952" y="354" width="176" height="56" rx="6" fill="#052E16" stroke="#22C55E" stroke-width="0.9"/>
  <text x="1040" y="372" text-anchor="middle" font-size="9.8" font-weight="600" fill="#A7F3D0">restore actor → MDC</text>
  <text x="1040" y="386" text-anchor="middle" font-size="9.5" fill="#8B93A8">every log line attributed</text>
  <text x="1040" y="400" text-anchor="middle" font-size="9.5" fill="#FCA5A5">cleared in finally (no bleed)</text>

  <!-- SUCCESS -->
  <line x1="1142" y1="340" x2="1168" y2="322" stroke="#38BDF8" stroke-width="2" marker-end="url(#aS)"/>
  <text x="1158" y="312" text-anchor="middle" font-size="9" fill="#7DD3FC">success</text>
  <rect x="1170" y="300" width="276" height="60" rx="10" fill="#0A1A2A" stroke="#38BDF8" stroke-width="1.4" filter="url(#sh)"/>
  <text x="1308" y="324" text-anchor="middle" font-size="12" font-weight="600" fill="#7DD3FC">🐘 notification_log (PostgreSQL)</text>
  <text x="1308" y="343" text-anchor="middle" font-size="9.8" fill="#94A3B8">idempotent · written with actor context</text>

  <!-- FAILURE → DLT -->
  <line x1="1142" y1="392" x2="1168" y2="418" stroke="#FB7185" stroke-width="2.2" marker-end="url(#aR)"/>
  <text x="1210" y="392" text-anchor="middle" font-size="9.2" fill="#FDA4AF">4 attempts exhausted</text>
  <rect x="1170" y="392" width="276" height="118" rx="10" fill="url(#dlG)" stroke="#FB7185" stroke-width="1.8" filter="url(#sh)"/>
  <text x="1308" y="416" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FDA4AF">💀 @DltHandler → dead_letter_events</text>
  <text x="1308" y="436" text-anchor="middle" font-size="9.8" fill="#FBB6C1">the anonymous-by-default moment —</text>
  <text x="1308" y="450" text-anchor="middle" font-size="9.8" fill="#FBB6C1">here we keep the memory:</text>
  <rect x="1186" y="458" width="244" height="42" rx="6" fill="#1E0A11"/>
  <text x="1308" y="475" text-anchor="middle" font-size="9.8" font-weight="600" fill="#FECDD3">actor_username · actor_email · actor_roles</text>
  <text x="1308" y="490" text-anchor="middle" font-size="9.5" fill="#94A3B8">last_error · trace_id → routable incident</text>

  <!-- KEY CALLOUTS -->
  <rect x="48" y="576" width="524" height="70" rx="10" fill="#0F1B2D" stroke="#334155" stroke-width="1"/>
  <text x="66" y="600" font-size="11.5" font-weight="700" fill="#93C5FD">Why persist identity with the event?</text>
  <text x="66" y="620" font-size="10.5" fill="#94A3B8">The publisher runs later, on another thread — SecurityContext, ThreadLocal</text>
  <text x="66" y="635" font-size="10.5" fill="#94A3B8">and MDC are all empty. Ambient state can't cross an async boundary; data can.</text>

  <rect x="600" y="576" width="846" height="70" rx="10" fill="#0F1B2D" stroke="#334155" stroke-width="1"/>
  <text x="618" y="600" font-size="11.5" font-weight="700" fill="#6EE7B7">One transport-agnostic IdentityContext, re-encoded at every hop</text>
  <text x="618" y="620" font-size="10.5" fill="#94A3B8">Committed in the same transaction as the write → as durable and replay-safe as the event itself.</text>
  <text x="618" y="635" font-size="10.5" fill="#94A3B8">Rides retries and dead-lettering, so provenance survives exactly where forensics begins.</text>

  <!-- FOOTER -->
  <rect x="40" y="820" width="1420" height="40" rx="8" fill="#0A1220" stroke="#1E2D45" stroke-width="1"/>
  <text x="180" y="845" text-anchor="middle" font-size="10.5" fill="#475569">github.com/Rummy43/ai-microservices-platform</text>
  <text x="770" y="845" text-anchor="middle" font-size="11" font-weight="600" fill="#64748B">Authentication says a request is allowed. Propagated identity says who was behind the event that broke production.</text>
  <text x="1360" y="845" text-anchor="middle" font-size="10.5" fill="#475569">by Ramesh Yara · 2026</text>
</svg>