name: Java CI with Gradle

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build and Install Common Schema
        working-directory: ./common-schema
        run: mvn clean install -DskipTests

      # --- User Service ---
      - name: Build User Service
        working-directory: ./user-service
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # Targeted unit tests only — the contextLoads @SpringBootTest needs live
      # infra (MySQL/Kafka) and is intentionally excluded from CI.
      - name: Test User Service (actor propagation)
        working-directory: ./user-service
        run: ./gradlew test --tests "*EventPublisherActorHeaderTest"

      # --- Notification Service ---
      - name: Build Notification Service
        working-directory: ./notification-service
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      # Targeted unit tests only — the contextLoads @SpringBootTest needs live
      # infra (Kafka/PostgreSQL) and is intentionally excluded from CI.
      - name: Test Notification Service (actor propagation)
        working-directory: ./notification-service
        run: ./gradlew test --tests "*ActorPropagationFlowTest"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            user-service/build/reports/tests/test
            notification-service/build/reports/tests/test
          if-no-files-found: ignore