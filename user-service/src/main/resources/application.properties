spring.application.name=user-service
spring.threads.virtual.enabled=true
server.port=8080

# Kafka Connection
spring.kafka.bootstrap-servers=localhost:9092

# Avro Configuration
spring.kafka.properties.schema.registry.url=http://localhost:8085
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.KafkaAvroSerializer

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/user_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Liquibase settings
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

logging.level.liquibase=INFO
#logging.level.org.springframework.boot.autoconfigure.liquibase=DEBUG