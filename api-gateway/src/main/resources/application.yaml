server:
  port: 8082

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/v1/users/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: userServiceCB
                    fallbackUri: forward:/fallback/users
                - name: Retry
                  args:
                    retries: 3
                    series: SERVER_ERROR
                    methods: GET

            - id: admin-route
              uri: http://localhost:8080
              predicates:
                - Path=/api/v1/admin/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: userServiceCB
                    fallbackUri: forward:/fallback/users

            - id: notification-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/notifications/**
              filters:
                - name: CircuitBreaker
                  args:
                    id: notificationServiceCB
                    fallbackUri: forward:/fallback/notifications
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/ai-microservices

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
    instances:
      userServiceCB:
        baseConfig: default
      notificationServiceCB:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
    instances:
      userServiceCB:
        baseConfig: default
      notificationServiceCB:
        baseConfig: default
  ratelimiter:
    instances:
      public-api:
        limitForPeriod: 20
        limitRefreshPeriod: 1s
        timeoutDuration: 0
        registerHealthIndicator: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always