server:
  port: 8082

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: http://localhost:8080
              predicates:
                - Path=/api/v1/users/**

            - id: notification-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always